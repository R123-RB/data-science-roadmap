<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0}

.week-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}

.phase-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.phase-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.phase-desc{font-size:13px;color:var(--color-text-secondary)}
.week-title{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.week-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem}
.days-list{display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.day-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.day-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-name{font-size:11px;color:var(--color-text-tertiary);margin-bottom:1px}
.day-topic{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.day-tag{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.day-body{padding:0 14px 14px 52px;display:none;flex-direction:column;gap:10px}
.day-body.open{display:flex}
.section-label{font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--color-text-tertiary);text-transform:uppercase;margin-bottom:4px}
.pill-row{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:12px;padding:3px 9px;border-radius:12px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.resource-row{display:flex;flex-direction:column;gap:4px}
.res{font-size:12px;color:var(--color-text-secondary);display:flex;align-items:flex-start;gap:6px}
.res-dot{width:5px;height:5px;border-radius:50%;background:var(--color-border-secondary);flex-shrink:0;margin-top:5px}
.exercise-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.exercise-box strong{color:var(--color-text-primary);font-weight:500}
.chevron{font-size:10px;color:var(--color-text-tertiary);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.proj-bar{background:var(--color-background-success);border-top:0.5px solid var(--color-border-success);padding:8px 14px 8px 52px}
.proj-label{font-size:11px;font-weight:500;color:var(--color-text-success)}
.proj-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.prog-wrap{margin-bottom:1rem}
.prog-track{height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
</style>
</head>

let curPhase=0, curWeek=0;

function phaseColor(p){ return C[data[p].color]; }

function renderPhaseTabs(){
  const nav=document.getElementById('phase-nav');
  nav.innerHTML='';
  data.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='ptab'+(i===curPhase?' on':'');
    b.textContent=p.phase+' · '+p.label;
    b.onclick=()=>{curPhase=i;curWeek=0;render();};
    nav.appendChild(b);
  });
}

function renderWeekTabs(){
  const wt=document.getElementById('week-tabs');
  wt.innerHTML='';
  data[curPhase].weeks.forEach((w,i)=>{
    const b=document.createElement('button');
    b.className='wtab'+(i===curWeek?' on':'');
    b.textContent='Week '+w.n+' — '+w.title;
    b.onclick=()=>{curWeek=i;renderWeek();};
    wt.appendChild(b);
  });
}

function renderWeek(){
  const p=data[curPhase], w=p.weeks[curWeek];
  const pc=phaseColor(curPhase);

  document.getElementById('prog-left').textContent='Phase '+(curPhase+1)+' of '+data.length+' · Week '+w.n+' of 18';
  document.getElementById('prog-right').textContent=Math.round(((curPhase*5+curWeek+1)/18)*100)+'% complete';
  const fill=document.getElementById('prog-fill');
  fill.style.width=Math.round(((curPhase*5+curWeek+1)/18)*100)+'%';
  fill.style.background=pc.dot;

  const badge=document.getElementById('phase-badge');
  badge.textContent=p.label;
  badge.style.background=pc.bg;
  badge.style.color=pc.text;
  badge.style.border='0.5px solid '+pc.text+'44';

  document.getElementById('phase-desc').textContent=p.desc;
  document.getElementById('week-title').textContent='Week '+w.n+' — '+w.title;
  document.getElementById('week-sub').textContent=w.sub;

  document.querySelectorAll('.wtab').forEach((t,i)=>{
    t.className='wtab'+(i===curWeek?' on':'');
  });

  const list=document.getElementById('days-list');
  list.innerHTML='';
  w.days.forEach((d,di)=>{
    const dc=C[DAY_COLORS[di]];
    const card=document.createElement('div');
    card.className='day-card';
    const isProj=d.tag==='project';

    let bodyHtml='';
    if(!isProj){
      const pills=d.concepts.map(c=>`<span class="pill">${c}</span>`).join('');
      const ress=d.resources.map(r=>`<div class="res"><span class="res-dot"></span><span>${r}</span></div>`).join('');
      bodyHtml=`
        <div>
          <div class="section-label">Concepts to master</div>
          <div class="pill-row">${pills}</div>
        </div>
        <div>
          <div class="section-label">Resources</div>
          <div class="resource-row">${ress}</div>
        </div>
        ${d.exercise?`<div>
          <div class="section-label">Hands-on exercise</div>
          <div class="exercise-box">${d.exercise}</div>
        </div>`:''}
      `;
    } else {
      bodyHtml=`
        <div>
          <div class="section-label">Resources</div>
          <div class="resource-row">${d.resources.map(r=>`<div class="res"><span class="res-dot"></span><span>${r}</span></div>`).join('')}</div>
        </div>
      `;
    }

    const tagStyle=`background:${dc.bg};color:${dc.text};border:0.5px solid ${dc.text}33`;
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay(this)">
        <div class="day-num" style="background:${dc.bg};color:${dc.text}">${di+1}</div>
        <div class="day-info">
          <div class="day-name">${d.name}</div>
          <div class="day-topic">${d.topic}</div>
        </div>
        <span class="day-tag" style="${tagStyle}">${d.tag}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="day-body">
        ${bodyHtml}
      </div>
      ${d.project?`<div class="proj-bar"><div class="proj-label">Weekend project — ${d.project.label}</div><div class="proj-desc">${d.project.desc}</div></div>`:''}
    `;
    list.appendChild(card);
  });
}

function toggleDay(header){
  const body=header.nextElementSibling;
  const chev=header.querySelector('.chevron');
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}

function render(){
  renderPhaseTabs();
  renderWeekTabs();
  renderWeek();
}

render();
</script>

let curPhase=0, curWeek=0;

function phaseColor(p){ return C[data[p].color]; }

function renderPhaseTabs(){
  const nav=document.getElementById('phase-nav');
  nav.innerHTML='';
  data.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='ptab'+(i===curPhase?' on':'');
    b.textContent=p.phase+' · '+p.label;
    b.onclick=()=>{curPhase=i;curWeek=0;render();};
    nav.appendChild(b);
  });
}

function renderWeekTabs(){
  const wt=document.getElementById('week-tabs');
  wt.innerHTML='';
  data[curPhase].weeks.forEach((w,i)=>{
    const b=document.createElement('button');
    b.className='wtab'+(i===curWeek?' on':'');
    b.textContent='Week '+w.n+' — '+w.title;
    b.onclick=()=>{curWeek=i;renderWeek();};
    wt.appendChild(b);
  });
}

function renderWeek(){
  const p=data[curPhase], w=p.weeks[curWeek];
  const pc=phaseColor(curPhase);

  document.getElementById('prog-left').textContent='Phase '+(curPhase+1)+' of '+data.length+' · Week '+w.n+' of 18';
  document.getElementById('prog-right').textContent=Math.round(((curPhase*5+curWeek+1)/18)*100)+'% complete';
  const fill=document.getElementById('prog-fill');
  fill.style.width=Math.round(((curPhase*5+curWeek+1)/18)*100)+'%';
  fill.style.background=pc.dot;

  const badge=document.getElementById('phase-badge');
  badge.textContent=p.label;
  badge.style.background=pc.bg;
  badge.style.color=pc.text;
  badge.style.border='0.5px solid '+pc.text+'44';

  document.getElementById('phase-desc').textContent=p.desc;
  document.getElementById('week-title').textContent='Week '+w.n+' — '+w.title;
  document.getElementById('week-sub').textContent=w.sub;

  document.querySelectorAll('.wtab').forEach((t,i)=>{
    t.className='wtab'+(i===curWeek?' on':'');
  });

  const list=document.getElementById('days-list');
  list.innerHTML='';
  w.days.forEach((d,di)=>{
    const dc=C[DAY_COLORS[di]];
    const card=document.createElement('div');
    card.className='day-card';
    const isProj=d.tag==='project';

    let bodyHtml='';
    if(!isProj){
      const pills=d.concepts.map(c=>`<span class="pill">${c}</span>`).join('');
      const ress=d.resources.map(r=>`<div class="res"><span class="res-dot"></span><span>${r}</span></div>`).join('');
      bodyHtml=`
        <div>
          <div class="section-label">Concepts to master</div>
          <div class="pill-row">${pills}</div>
        </div>
        <div>
          <div class="section-label">Resources</div>
          <div class="resource-row">${ress}</div>
        </div>
        ${d.exercise?`<div>
          <div class="section-label">Hands-on exercise</div>
          <div class="exercise-box">${d.exercise}</div>
        </div>`:''}
      `;
    } else {
      bodyHtml=`
        <div>
          <div class="section-label">Resources</div>
          <div class="resource-row">${d.resources.map(r=>`<div class="res"><span class="res-dot"></span><span>${r}</span></div>`).join('')}</div>
        </div>
      `;
    }

    const tagStyle=`background:${dc.bg};color:${dc.text};border:0.5px solid ${dc.text}33`;
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay(this)">
        <div class="day-num" style="background:${dc.bg};color:${dc.text}">${di+1}</div>
        <div class="day-info">
          <div class="day-name">${d.name}</div>
          <div class="day-topic">${d.topic}</div>
        </div>
        <span class="day-tag" style="${tagStyle}">${d.tag}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="day-body">
        ${bodyHtml}
      </div>
      ${d.project?`<div class="proj-bar"><div class="proj-label">Weekend project — ${d.project.label}</div><div class="proj-desc">${d.project.desc}</div></div>`:''}
    `;
    list.appendChild(card);
  });
}

function toggleDay(header){
  const body=header.nextElementSibling;
  const chev=header.querySelector('.chevron');
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}

function render(){
  renderPhaseTabs();
  renderWeekTabs();
  renderWeek();
}

render();
</script>
